   <div class="row g-4">
        <div class="col-lg-4">
          <div class="card border-0 shadow-sm h-100 rounded-4">
            <div class="card-body">
              <h6 class="fw-bold text-uppercase border-bottom pb-2 mb-3 text-primary">Customer Details</h6>
              <div class="mb-3">
                <label class="form-label fw-bold text-secondary small text-uppercase">Customer ID</label>
                <input class="form-control bg-light" id="cId" placeholder="Auto-generated" readonly>
              </div>
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label class="form-label fw-bold text-secondary small text-uppercase">First Name</label>
                  <input class="form-control" id="cFn" placeholder="First name">
                </div>
                <div class="col-6">
                  <label class="form-label fw-bold text-secondary small text-uppercase">Last Name</label>
                  <input class="form-control" id="cLn" placeholder="Last name">
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold text-secondary small text-uppercase">Email</label>
                <input type="email" class="form-control" id="cEm" placeholder="email@example.com">
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold text-secondary small text-uppercase">Phone Number</label>
                <input class="form-control" id="cPh" placeholder="+94 77 123 4567">
              </div>
              <div class="mb-4">
                <label class="form-label fw-bold text-secondary small text-uppercase">Address</label>
                <textarea class="form-control" id="cAd" rows="2" placeholder="Customer address..."></textarea>
              </div>
              <div class="d-flex flex-wrap gap-2 justify-content-end">
                <button class="btn btn-success fw-bold" onclick="saveCust()">✅ Save</button>
                <button class="btn btn-info text-white fw-bold" onclick="updateCust()">🔄 Update</button>
                <button class="btn btn-danger fw-bold" onclick="deleteCust()">🗑 Delete</button>
                <button class="btn btn-warning text-white fw-bold" onclick="clearCust()">↺ Clear</button>
              </div>
            </div>
          </div>
        </div>
        
        <div class="col-lg-8">
          <div class="card border-0 shadow-sm h-100 rounded-4">
            <div class="card-header bg-white p-3 border-bottom-0 rounded-top-4">
              <div class="input-group">
                <span class="input-group-text bg-light border-end-0">🔍</span>
                <input class="form-control bg-light border-start-0" id="cSearch" placeholder="Search customer by name..." oninput="filterCust()">
              </div>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table table-striped table-hover align-middle mb-0">
                  <thead class="table-primary">
                    <tr><th>ID</th><th>Full Name</th><th>Email</th><th>Phone</th></tr>
                  </thead>
                  <tbody id="custTbl"></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>


<!-- //==================================================== -->


      <div class="row g-3">

  <!-- FORM CARD -->
  <div class="col-lg-4">
    <div class="card border-0 shadow-sm rounded-3 h-100">

      <div class="card-body p-2">

        <h6 class="fw-bold text-primary border-bottom pb-1 mb-2 small">
          Customer Details
        </h6>

        <input class="form-control form-control-sm mb-2 bg-light"
               id="cId" placeholder="Auto ID" readonly>

        <div class="row g-2 mb-2">
          <div class="col-6">
            <input class="form-control form-control-sm" id="cFn" placeholder="First name">
          </div>
          <div class="col-6">
            <input class="form-control form-control-sm" id="cLn" placeholder="Last name">
          </div>
        </div>

        <input class="form-control form-control-sm mb-2"
               id="cEm" placeholder="Email">

        <input class="form-control form-control-sm mb-2"
               id="cPh" placeholder="Phone">

        <textarea class="form-control form-control-sm mb-2"
                  id="cAd" rows="2" placeholder="Address"></textarea>

        <div class="d-flex gap-1 flex-wrap">
          <button class="btn btn-success btn-sm px-2">Save</button>
          <button class="btn btn-info btn-sm text-white px-2">Update</button>
          <button class="btn btn-danger btn-sm px-2">Delete</button>
          <button class="btn btn-warning btn-sm text-white px-2">Clear</button>
        </div>

      </div>
    </div>
  </div>

  <!-- TABLE CARD -->
  <div class="col-lg-8">
    <div class="card border-0 shadow-sm rounded-3 h-100">

      <div class="card-header bg-white p-2">
        <input class="form-control form-control-sm"
               id="cSearch"
               placeholder="Search customer..."
               oninput="filterCust()">
      </div>

      <div class="table-responsive"
           style="max-height: 420px; overflow-y:auto;">

        <table class="table table-sm table-hover mb-0">
          <thead class="table-primary sticky-top">
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
            </tr>
          </thead>
          <tbody id="custTbl"></tbody>
        </table>

      </div>

    </div>
  </div>

</div>
